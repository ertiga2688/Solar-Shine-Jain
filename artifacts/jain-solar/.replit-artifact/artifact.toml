kind = "web"
previewPath = "/"
title = "Jain Communications Solar"
version = "1.0.0"
id = "artifacts/jain-solar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25374

[services.development]
run = "pnpm --filter @workspace/jain-solar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jain-solar", "run", "build" ]
publicDir = "artifacts/jain-solar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25374"
BASE_PATH = "/"
